services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: idem
      POSTGRES_PASSWORD: idem
      POSTGRES_DB: idem
    ports:
      - "5433:5432"
    volumes:
      - idem_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idem"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  idem_pgdata:
